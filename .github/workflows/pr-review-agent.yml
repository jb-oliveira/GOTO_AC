name: Copilot PR Reviewer

on:
  pull_request:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          

      - name: Install Copilot CLI
        run: |
          curl -fsSL https://gh.io/copilot-install | bash
      
      - name: Authenticate and Execute
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: | 
          prompt=$({
            cat .github/agents/pr-agent.md
            echo "=== PR DIFF ==="
            git diff origin/${{ github.base_ref }}...HEAD
          })

          printf '%s' "$prompt" | copilot --allow-all-tools --no-ask-user

      - name: Commit changes
        run: |          
          if [[ -n "$(git status --porcelain)" ]]; then
            commit_message=""

            if [[ -f review.txt ]]; then
              commit_message="$(cat review.txt)"
              rm -f review.txt
            fi

            if [[ -z "$commit_message" ]]; then
              commit_message="Copilot fixes [skip ci]"
            fi
            
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git add .
            git commit -m "$commit_message"
            git push origin HEAD:${{ github.head_ref }}
          fi